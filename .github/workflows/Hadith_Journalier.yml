name: Hadith Bot Daily

on:
  schedule:
    - cron: '0 6 * * *'  # Tous les jours à 6h UTC
  workflow_dispatch:

jobs:
  run-hadith-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install groq requests
      
      - name: Verify secrets (without revealing them)
        run: |
          if [ -n "${{ secrets.GROQ_API_KEY }}" ]; then
            echo "✅ GROQ_API_KEY is set"
          else
            echo "❌ GROQ_API_KEY is missing"
            exit 1
          fi
          
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "✅ TELEGRAM_BOT_TOKEN is set"
          else
            echo "❌ TELEGRAM_BOT_TOKEN is missing"
            exit 1
          fi
          
          if [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            echo "✅ TELEGRAM_CHAT_ID is set"
          else
            echo "❌ TELEGRAM_CHAT_ID is missing"
            exit 1
          fi
      
      - name: Run Hadith Bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python Hadith.py
